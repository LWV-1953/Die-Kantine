<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Speiseplan Kantine Kassel</title>
<style>
  :root {
    --primary: #0F4C81;
    --primary-dark: #0A3760;
    --bg: #FFFFFF;
    --text: #1A1A1A;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: -apple-system, Roboto, Segoe UI, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* Startbildschirm */
  #home {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px;
    position: relative;
  }

  #logoBanner {
    width: 100%;
    max-width: 420px;
    background: transparent;
    border-radius: 16px;
    padding: 28px 20px;
    margin: 16px 0 40px;
    display: flex;
    justify-content: center;
    box-shadow: none;
  }
  #logoBanner img {
    width: 100%;
    max-width: 320px;
    height: auto;
    display: block;
  }

  .btn {
    width: 100%;
    max-width: 360px;
    padding: 20px;
    margin-bottom: 18px;
    font-size: 1.05rem;
    font-weight: 600;
    color: white;
    background: var(--primary);
    border: none;
    border-radius: 14px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transition: transform 0.1s ease, background 0.2s ease;
  }
  .btn:active {
    background: var(--primary-dark);
    transform: scale(0.98);
  }

  #lwvCorner {
    position: fixed;
    bottom: 14px;
    right: 14px;
    width: 90px;
    opacity: 0.95;
    pointer-events: none;
  }
  #lwvCorner img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Viewer-Ansicht */
  #viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    flex-direction: column;
  }
  #viewer.active { display: flex; }

  #viewerBar {
    background: var(--primary);
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #backBtn {
    background: none;
    border: none;
    color: white;
    font-size: 1.4rem;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  #viewerTitle {
    font-size: 1rem;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #pdfFrame {
    flex: 1;
    width: 100%;
    border: none;
  }

  #fallbackLink {
    display: none;
    padding: 16px;
    text-align: center;
    background: white;
    border-top: 1px solid #ddd;
  }
  #fallbackLink a {
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;
  }
</style>
